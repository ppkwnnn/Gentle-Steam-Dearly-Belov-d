<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <button class="credit-btn" onclick="toggleCredit()" title="ดูเครดิต">?</button>

        <div class="logo-container">
            <img src="https://img2.pic.in.th/-181_20260411152816.md.png" alt="Game Logo" class="logo">
        </div>

        <div class="menu-buttons">
            <button class="btn btn-start" onclick="startGame()">START</button>
            <button class="btn btn-wishboard" onclick="alert('Opening Wishboard...')">Wishboard</button>
        </div>

        <div id="creditOverlay" class="overlay" onclick="closeOverlay(event)">
            <div class="credit-card">
                <h2>Special Thanks</h2>
                <div class="credit-content">
                    <p><b>Head Project:</b> Your Name</p>
                    <p><b>Character Artist:</b> Artist Name</p>
                    <p><b>Background Artist:</b> Artist Name</p>
                    <p><b>Developer:</b> Your Name</p>
                    <p><b>Music:</b> Lo-fi Coffee Shop</p>
                </div>
                <button class="close-btn" onclick="toggleCredit()">Close</button>
            </div>
        </div>

        <div id="gameplay-scene" class="hidden fixed inset-0 z-50">
            <div id="bg-layer" class="absolute inset-0 bg-cover bg-center transition-all duration-500" 
                 style="background-image: url('https://img2.pic.in.th/IMG_7826.md.jpeg');"></div>

            <div class="absolute inset-0 flex justify-center items-end pb-20">
                <img id="char-sprite" src="https://img2.pic.in.th/-182_20260411164509.md.png" 
                     class="h-[80vh] object-contain drop-shadow-2xl transition-opacity duration-300">
            </div>

            <div class="absolute bottom-10 left-0 right-0 flex flex-col items-center px-4" onclick="nextDialogue()">
                
                <div id="name-tag" class="self-start ml-[10%] mb-[-10px] z-10 px-6 py-1 rounded-t-lg bg-[#7a5c48] text-white font-bold hidden">
                    Character Name
                </div>

                <div class="w-full max-w-[1000px] bg-white/70 backdrop-blur-md rounded-2xl p-8 border-2 border-[#7a5c48]/20 shadow-xl cursor-pointer">
                    <p id="dialogue-text" class="text-[#7a5c48] text-xl leading-relaxed drop-shadow-[0_1px_1px_rgba(255,255,255,1)]">
                        ข้อความบรรยายจะปรากฏที่นี่...
                    </p>
                </div>
            </div>

            <div id="choice-container" class="absolute inset-0 flex flex-col justify-center items-center gap-4 bg-black/20 hidden">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
